  - name: "knockers"
    label: "Knockers"
    folder: "_data/knockers"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Image", name: "image", widget: "image", media_folder: "/images/products/knockers", public_folder: "images/products/knockers" }

  - name: "window-handles"
    label: "Window Handles & Accessories"
    folder: "_data/window-handles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Image", name: "image", widget: "image", media_folder: "/images/products/window-handles", public_folder: "images/products/window-handles" }
