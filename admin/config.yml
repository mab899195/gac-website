backend:
  name: git-gateway
  branch: main

media_folder: "images/products"
public_folder: "images/products"

collections:
  - name: "pull-handles"
    label: "Pull Handles"
    folder: "_data/pull-handles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Image", name: "image", widget: "image", media_folder: "/images/products/pull-handles", public_folder: "images/products/pull-handles" }

  - name: "plate-handles"
    label: "Plate Handles"
    folder: "_data/plate-handles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Image", name: "image", widget: "image", media_folder: "/images/products/plate-handles", public_folder: "images/products/plate-handles" }

  - name: "rose-handles"
    label: "Rose Handles"
