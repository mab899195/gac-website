    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Image", name: "image", widget: "image", media_folder: "/images/products/rose-handles", public_folder: "images/products/rose-handles" }

  - name: "knobs"
    label: "Knobs"
